name: Build and deploy Jekyll site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate OG preview screenshot
        run: |
          mkdir -p /tmp/screenshot && cd /tmp/screenshot
          npm init -y >/dev/null
          npm install playwright http-server >/dev/null
          npx playwright install --with-deps chromium
          cd $GITHUB_WORKSPACE
          /tmp/screenshot/node_modules/.bin/http-server _site -p 8080 -s &
          SERVER_PID=$!
          for i in {1..20}; do
            curl -sf http://localhost:8080/ >/dev/null && break
            sleep 0.5
          done
          NODE_PATH=/tmp/screenshot/node_modules node -e "
            const { chromium } = require('playwright');
            (async () => {
              const browser = await chromium.launch();
              const page = await browser.newPage({ viewport: { width: 1200, height: 630 } });
              await page.goto('http://localhost:8080/', { waitUntil: 'networkidle', timeout: 60000 });
              // Wait for fonts
              await page.evaluate(() => document.fonts.ready);
              // Wait for ion-icons custom element to be registered
              await page.waitForFunction(
                () => window.customElements && window.customElements.get('ion-icon'),
                { timeout: 15000 }
              );
              // Wait for the DOMContentLoaded JS to swap ol.bibliography → ul.bibliography
              await page.waitForFunction(
                () => document.querySelectorAll('ol.bibliography').length === 0,
                { timeout: 10000 }
              ).catch(() => {});
              // Wait for all images on the page to load
              await page.waitForFunction(() =>
                Array.from(document.images).every(img => img.complete && img.naturalWidth > 0),
                { timeout: 15000 }
              ).catch(() => {});
              // Final settle delay so any animations/CSS transitions finish
              await page.waitForTimeout(1500);
              await page.screenshot({ path: '_site/assets/img/preview.png', fullPage: true });
              await browser.close();
            })();
          "
          kill $SERVER_PID || true

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
