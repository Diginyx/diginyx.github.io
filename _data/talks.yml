# Each talk supports these fields (only `title`, `venue`, `date`, `year` are required):
#   title:        the title of the talk
#   type:         e.g. "Conference Paper", "Poster Session", "Guest Lecture", "Lightning Talk"
#   date:         e.g. "August 2025"
#   year:         numeric year (used for grouping)
#   venue:        full venue name (rendered in italics)
#   location:     city / country
#   publication:  link to paper (Publication button)
#   preprint:     link to arXiv / preprint (Preprint button)
#   code:         link to code repo (Code button)
#   poster:       URL OR filename in /assets/pdf/  (Poster button)
#   slides:       URL OR filename in /assets/pdf/  (Slides button)
#   video:        link to video (Video button)

